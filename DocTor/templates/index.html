<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocTor</title>
</head>
<body>

    <h1>📄 DocTor</h1>

    <!-- Upload Form -->

    <h2>Upload PDF</h2>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <input 
            type="file"
            name="pdf"
            accept=".pdf"
            required>

        <button type="submit">
            Upload
        </button>

    </form>

    <!-- Ask Form -->

    <h2>Ask A Question</h2>

    <form action="/ask" method="POST">'

        <input 
        type="text" 
        name="question" 
        placeholder="Ask Anything About The Document..."
        required>

        <button type="submit">
            Ask
        </button>

    </form>

    {% if answer %}

    <hr>

    <h2>Answer</h2>

    <p>{{ answer }}</p>

    {% endif %}
    
</body>
</html>
